<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-96 border border-slate-700">
        <h1 class="text-3xl font-bold text-white mb-6 text-center">AI Manager</h1>
        <form method="POST">
            <div class="mb-4">
                <label class="block text-slate-400 text-sm mb-2">Username</label>
                <input type="text" name="username" class="w-full bg-slate-700 border-none rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div class="mb-6">
                <label class="block text-slate-400 text-sm mb-2">Password</label>
                <input type="password" name="password" class="w-full bg-slate-700 border-none rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">Login</button>
        </form>
    </div>
</body>
</html>
